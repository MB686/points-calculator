<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Weight Watchers Points Calculator</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  max-width: 400px;
  margin: 0 auto;
  padding: 20px;
  background-color: #f8f9fa;
}
h1 {
  width: 80%;
  margin: 0 auto 25px;
  text-align: center;
  color: #333;
}
h2 {
  width: 80%;
  margin: 0 auto 15px;
  text-align: center;
  color: #333;
  font-size: 18px;
}
.section-hint {
  width: 80%;
  margin: -10px auto 15px;
  text-align: center;
  color: #999;
  font-size: 14px;
}
.section-divider {
  border-top: 2px solid #e0e0e0;
  width: 80%;
  margin: 30px auto 20px;
}
label {
  display: block;
  margin: 12px auto 6px;
  font-size: 17px;
  font-weight: 600;
  width: 80%;
  color: #444;
}
input {
  width: 80%;
  padding: 12px;
  box-sizing: border-box;
  margin: 0 auto;
  display: block;
  font-size: 17px;
  border: 2px solid #ccc;
  border-radius: 8px;
  background-color: white;
  transition: border-color 0.2s;
}
input:focus {
  outline: none;
  border-color: #4CAF50;
  box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
}
input::placeholder {
  color: #aaa;
}
button {
  width: 80%;
  padding: 14px;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 12px auto;
  display: block;
  font-size: 18px;
  font-weight: bold;
}
button:hover {
  background-color: #45a049;
}
#clearButton {
  background-color: #f44336;
  margin-top: 10px;
}
#clearButton:hover {
  background-color: #da190b;
}
#addToJournalButton {
  background-color: #2196F3;
}
#addToJournalButton:hover {
  background-color: #1976D2;
}
#resetDayButton {
  background-color: #9e9e9e;
  font-size: 15px;
  padding: 10px;
}
#resetDayButton:hover {
  background-color: #7e7e7e;
}
#result {
  margin: 25px auto 0;
  font-size: 22px;
  font-weight: bold;
  width: 80%;
  text-align: center;
  color: #2c3e50;
  min-height: 30px;
}
.tracker-box {
  background-color: white;
  border: 2px solid #ccc;
  border-radius: 8px;
  padding: 15px;
  width: 80%;
  margin: 0 auto 12px;
  box-sizing: border-box;
}
.tracker-row {
  display: flex;
  justify-content: space-between;
  font-size: 17px;
  padding: 4px 0;
}
.tracker-row span:first-child {
  color: #444;
  font-weight: 600;
}
.tracker-row span:last-child {
  font-weight: bold;
}
.remaining-ok {
  color: #4CAF50;
}
.remaining-over {
  color: #f44336;
}
.food-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background-color: white;
  border: 2px solid #ccc;
  border-radius: 8px;
  padding: 10px 12px;
  width: 80%;
  margin: 8px auto;
  box-sizing: border-box;
}
.food-info {
  flex: 1;
  min-width: 0;
}
.food-name {
  font-weight: 600;
  color: #333;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.food-points {
  color: #888;
  font-size: 14px;
}
.food-actions {
  display: flex;
  gap: 6px;
  margin-left: 8px;
}
.food-actions button {
  width: auto;
  margin: 0;
  padding: 8px 12px;
  font-size: 14px;
}
.add-food-btn {
  background-color: #4CAF50;
}
.add-food-btn:hover {
  background-color: #45a049;
}
.delete-food-btn {
  background-color: #f44336;
}
.delete-food-btn:hover {
  background-color: #da190b;
}
#noJournalItems, #noSavedFoods {
  width: 80%;
  margin: 10px auto;
  text-align: center;
  color: #999;
  font-size: 15px;
}
.sync-box {
  background-color: white;
  border: 2px solid #ccc;
  border-radius: 8px;
  padding: 15px;
  width: 80%;
  margin: 0 auto 12px;
  box-sizing: border-box;
  text-align: center;
}
.sync-box p {
  margin: 0 0 8px;
  color: #444;
  font-weight: 600;
}
.sync-code-display {
  font-family: monospace;
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 4px;
  color: #2c3e50;
  background-color: #f0f0f0;
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 10px;
}
#copyCodeButton {
  background-color: #2196F3;
  font-size: 15px;
  padding: 10px;
  margin: 0 auto;
}
#copyCodeButton:hover {
  background-color: #1976D2;
}
#syncStatus {
  margin: 10px 0 0;
  font-size: 14px;
  color: #999;
  font-weight: normal;
}
#connectSyncButton {
  background-color: #2196F3;
}
#connectSyncButton:hover {
  background-color: #1976D2;
}
</style>
</head>
<body>

<h1>Weight Watchers Points Calculator</h1>

<label for="foodName">Food Name:</label>
<input type="text" id="foodName" placeholder="e.g. Apple, Chicken Breast">

<label for="calories">Calories:</label>
<input type="number" id="calories" placeholder="Enter calories">

<label for="fat">Fat (grams):</label>
<input type="number" id="fat" placeholder="Enter fat grams">

<label for="fiber">Fiber (grams):</label>
<input type="number" id="fiber" placeholder="Enter fiber grams">

<button onclick="calculatePoints()">Calculate</button>
<button id="clearButton" onclick="clearFields()">Clear</button>

<div id="result"></div>

<button id="addToJournalButton" onclick="addToJournal()">Add to Food Journal</button>

<div class="section-divider"></div>
<h2>Today's Food Journal</h2>

<label for="allowance">Daily Allowance:</label>
<input type="number" id="allowance" placeholder="Enter daily points allowance">

<div class="tracker-box">
  <div class="tracker-row"><span>Used Today:</span><span id="usedToday">0</span></div>
  <div class="tracker-row"><span>Remaining:</span><span id="remainingToday">0</span></div>
</div>

<div id="journalList"></div>
<div id="noJournalItems">No foods logged yet today</div>

<button id="resetDayButton" onclick="resetDay()">Reset Day</button>

<div class="section-divider"></div>
<h2>Saved Foods</h2>
<p class="section-hint">Quickly add foods you eat often</p>

<button id="saveFoodButton" onclick="saveFood()">Save Current Food</button>

<div id="savedFoodsList"></div>
<div id="noSavedFoods">No saved foods yet</div>

<div class="section-divider"></div>
<h2>Sync Across Devices</h2>

<div class="sync-box">
  <p>Your Sync Code</p>
  <div class="sync-code-display" id="syncCodeDisplay">--------</div>
  <button id="copyCodeButton" onclick="copySyncCode()">Copy Code</button>
  <p id="syncStatus">Connecting...</p>
</div>

<label for="syncCodeInput">Enter a Sync Code From Another Device:</label>
<input type="text" id="syncCodeInput" placeholder="e.g. AB12CD34">
<button id="connectSyncButton" onclick="connectSyncCode()">Connect</button>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/points-calculator/sw.js')
    .then(() => console.log('Service Worker Registered in index.html'))
    .catch(error => console.log('Service Worker Registration Failed in index.html:', error));
}

/* ---------- Firebase setup ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyDHdqTZVy3q56ZfzygZunPscViqA1utlzQ",
  authDomain: "points-calculator-c1eef.firebaseapp.com",
  projectId: "points-calculator-c1eef",
  storageBucket: "points-calculator-c1eef.firebasestorage.app",
  messagingSenderId: "874686198370",
  appId: "1:874686198370:web:9f65c29e9198f5ab72973b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let lastCalculatedPoints = null;
let syncCode = null;
let unsubscribeSync = null;
let isApplyingRemote = false;
let saveTimeout = null;

/* ---------- Calculator ---------- */

function calculatePoints() {
  const calories = parseFloat(document.getElementById('calories').value) || 0;
  const fat = parseFloat(document.getElementById('fat').value) || 0;
  const fiber = parseFloat(document.getElementById('fiber').value) || 0;

  const cappedFiber = Math.min(fiber, 4);
  const points = Math.round((calories / 50) + (fat / 12) - (cappedFiber / 5));

  lastCalculatedPoints = points;
  document.getElementById('result').innerText = `Points: ${points}`;
}

function clearFields() {
  document.getElementById('foodName').value = '';
  document.getElementById('calories').value = '';
  document.getElementById('fat').value = '';
  document.getElementById('fiber').value = '';
  document.getElementById('result').innerText = '';
  lastCalculatedPoints = null;
}

/* ---------- Food Journal ---------- */

function checkNewDay() {
  const today = new Date().toDateString();
  const storedDate = localStorage.getItem('wwDailyDate');
  if (storedDate !== today) {
    localStorage.setItem('wwFoodJournal', '[]');
    localStorage.setItem('wwDailyDate', today);
  }
}

function getJournal() {
  return JSON.parse(localStorage.getItem('wwFoodJournal') || '[]');
}

function setJournal(journal) {
  localStorage.setItem('wwFoodJournal', JSON.stringify(journal));
}

function updateDailyDisplay() {
  const allowance = parseFloat(document.getElementById('allowance').value) || 0;
  const journal = getJournal();
  const used = journal.reduce((sum, item) => sum + item.points, 0);
  const remaining = allowance - used;

  document.getElementById('usedToday').innerText = used;

  const remainingEl = document.getElementById('remainingToday');
  remainingEl.innerText = remaining;
  remainingEl.className = remaining >= 0 ? 'remaining-ok' : 'remaining-over';
}

function addToJournal() {
  if (lastCalculatedPoints === null) {
    alert('Calculate points first.');
    return;
  }

  const nameInput = document.getElementById('foodName');
  const name = nameInput.value.trim() || 'Food';

  const journal = getJournal();
  journal.unshift({ name: name, points: lastCalculatedPoints });
  setJournal(journal);

  renderJournal();
  updateDailyDisplay();
  clearFields();
  saveToCloud();
}

function deleteJournalEntry(index) {
  const journal = getJournal();
  journal.splice(index, 1);
  setJournal(journal);
  renderJournal();
  updateDailyDisplay();
  saveToCloud();
}

function resetDay() {
  if (confirm("Clear today's food journal and start fresh?")) {
    setJournal([]);
    localStorage.setItem('wwDailyDate', new Date().toDateString());
    renderJournal();
    updateDailyDisplay();
    saveToCloud();
  }
}

function renderJournal() {
  const journal = getJournal();
  const container = document.getElementById('journalList');
  const emptyMessage = document.getElementById('noJournalItems');

  container.innerHTML = '';

  if (journal.length === 0) {
    emptyMessage.style.display = 'block';
    return;
  }
  emptyMessage.style.display = 'none';

  journal.forEach((item, index) => {
    const row = document.createElement('div');
    row.className = 'food-list-item';

    const info = document.createElement('div');
    info.className = 'food-info';

    const nameEl = document.createElement('span');
    nameEl.className = 'food-name';
    nameEl.innerText = item.name;

    const pointsEl = document.createElement('span');
    pointsEl.className = 'food-points';
    pointsEl.innerText = `${item.points} pts`;

    info.appendChild(nameEl);
    info.appendChild(pointsEl);

    const actions = document.createElement('div');
    actions.className = 'food-actions';

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-food-btn';
    deleteBtn.innerText = 'Delete';
    deleteBtn.onclick = () => deleteJournalEntry(index);

    actions.appendChild(deleteBtn);

    row.appendChild(info);
    row.appendChild(actions);
    container.appendChild(row);
  });
}

document.getElementById('allowance').addEventListener('input', function () {
  localStorage.setItem('wwDailyAllowance', this.value);
  updateDailyDisplay();
  saveToCloud();
});

/* ---------- Saved Foods (favorites) ---------- */

function getSavedFoods() {
  return JSON.parse(localStorage.getItem('wwSavedFoods') || '[]');
}

function setSavedFoods(foods) {
  localStorage.setItem('wwSavedFoods', JSON.stringify(foods));
}

function saveFood() {
  const name = document.getElementById('foodName').value.trim();

  if (!name) {
    alert('Enter a name for this food.');
    return;
  }
  if (lastCalculatedPoints === null) {
    alert('Calculate points first.');
    return;
  }

  const foods = getSavedFoods();
  foods.push({ name: name, points: lastCalculatedPoints });
  setSavedFoods(foods);

  renderSavedFoods();
  saveToCloud();
}

function addSavedFood(index) {
  const foods = getSavedFoods();
  const food = foods[index];
  if (!food) return;

  const journal = getJournal();
  journal.unshift({ name: food.name, points: food.points });
  setJournal(journal);

  renderJournal();
  updateDailyDisplay();
  saveToCloud();
}

function deleteSavedFood(index) {
  const foods = getSavedFoods();
  foods.splice(index, 1);
  setSavedFoods(foods);
  renderSavedFoods();
  saveToCloud();
}

function renderSavedFoods() {
  const foods = getSavedFoods();
  const container = document.getElementById('savedFoodsList');
  const emptyMessage = document.getElementById('noSavedFoods');

  container.innerHTML = '';

  if (foods.length === 0) {
    emptyMessage.style.display = 'block';
    return;
  }
  emptyMessage.style.display = 'none';

  foods.forEach((food, index) => {
    const item = document.createElement('div');
    item.className = 'food-list-item';

    const info = document.createElement('div');
    info.className = 'food-info';

    const nameEl = document.createElement('span');
    nameEl.className = 'food-name';
    nameEl.innerText = food.name;

    const pointsEl = document.createElement('span');
    pointsEl.className = 'food-points';
    pointsEl.innerText = `${food.points} pts`;

    info.appendChild(nameEl);
    info.appendChild(pointsEl);

    const actions = document.createElement('div');
    actions.className = 'food-actions';

    const addBtn = document.createElement('button');
    addBtn.className = 'add-food-btn';
    addBtn.innerText = 'Add';
    addBtn.onclick = () => addSavedFood(index);

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-food-btn';
    deleteBtn.innerText = 'Delete';
    deleteBtn.onclick = () => deleteSavedFood(index);

    actions.appendChild(addBtn);
    actions.appendChild(deleteBtn);

    item.appendChild(info);
    item.appendChild(actions);
    container.appendChild(item);
  });
}

/* ---------- Cross-Device Sync ---------- */

function generateSyncCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // avoids ambiguous chars like 0/O, 1/I
  let code = '';
  for (let i = 0; i < 8; i++) {
    code += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return code;
}

function getLocalState() {
  return {
    allowance: localStorage.getItem('wwDailyAllowance') || '',
    dailyDate: localStorage.getItem('wwDailyDate') || '',
    foodJournal: getJournal(),
    savedFoods: getSavedFoods()
  };
}

function applyRemoteState(state) {
  isApplyingRemote = true;

  if (state.allowance !== undefined) {
    localStorage.setItem('wwDailyAllowance', state.allowance);
    document.getElementById('allowance').value = state.allowance;
  }
  if (state.dailyDate !== undefined) {
    localStorage.setItem('wwDailyDate', state.dailyDate);
  }
  if (state.foodJournal !== undefined) {
    setJournal(state.foodJournal);
  }
  if (state.savedFoods !== undefined) {
    setSavedFoods(state.savedFoods);
  }

  checkNewDay();
  updateDailyDisplay();
  renderJournal();
  renderSavedFoods();

  isApplyingRemote = false;
}

function startSync(code) {
  if (unsubscribeSync) {
    unsubscribeSync();
    unsubscribeSync = null;
  }

  const docRef = db.collection('syncData').doc(code);

  unsubscribeSync = docRef.onSnapshot(
    (doc) => {
      if (doc.exists) {
        applyRemoteState(doc.data());
      } else {
        docRef.set(getLocalState()).catch((err) => console.error('Initial sync save failed', err));
      }
      document.getElementById('syncStatus').innerText = 'Synced \u2713';
    },
    (error) => {
      document.getElementById('syncStatus').innerText = 'Sync error - check connection';
      console.error('Sync error:', error);
    }
  );
}

function saveToCloud() {
  if (isApplyingRemote || !syncCode) return;

  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    db.collection('syncData').doc(syncCode).set(getLocalState())
      .catch((err) => console.error('Sync save failed', err));
  }, 500);
}

function connectSyncCode() {
  const input = document.getElementById('syncCodeInput');
  const newCode = input.value.trim().toUpperCase();

  if (!newCode) {
    alert('Enter a sync code.');
    return;
  }
  if (newCode === syncCode) {
    alert('That is already your current sync code.');
    return;
  }
  if (!confirm("Connecting will replace this device's data with the data from that sync code. Continue?")) {
    return;
  }

  syncCode = newCode;
  localStorage.setItem('wwSyncCode', syncCode);
  document.getElementById('syncCodeDisplay').innerText = syncCode;
  document.getElementById('syncStatus').innerText = 'Connecting...';
  input.value = '';

  startSync(syncCode);
}

function copySyncCode() {
  if (!syncCode) return;
  navigator.clipboard.writeText(syncCode).then(() => {
    const status = document.getElementById('syncStatus');
    const previous = status.innerText;
    status.innerText = 'Copied!';
    setTimeout(() => { status.innerText = previous; }, 1500);
  });
}

/* ---------- Init ---------- */

checkNewDay();

const savedAllowance = localStorage.getItem('wwDailyAllowance');
if (savedAllowance !== null) {
  document.getElementById('allowance').value = savedAllowance;
}

updateDailyDisplay();
renderJournal();
renderSavedFoods();

syncCode = localStorage.getItem('wwSyncCode');
if (!syncCode) {
  syncCode = generateSyncCode();
  localStorage.setItem('wwSyncCode', syncCode);
}
document.getElementById('syncCodeDisplay').innerText = syncCode;
startSync(syncCode);
</script>
</body>
</html>
